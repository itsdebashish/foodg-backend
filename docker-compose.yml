version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: foodg-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: foodg
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d foodg"]
      interval: 10s
      timeout: 5s
      retries: 5

  foodg-app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: foodg-app

    depends_on:
      postgres:
        condition: service_healthy

    restart: unless-stopped

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/foodg
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

volumes:
  postgres-data: